// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt = (n, currency) => `${currency}${n.toLocaleString()}`;

const groupByDate = (txns) => {
  const today = new Date('2026-05-03');
  const yesterday = new Date('2026-05-02');
  const groups = {};
  txns.forEach(t => {
    const d = new Date(t.date);
    let label;
    if (d.toDateString() === today.toDateString()) label = 'Today';
    else if (d.toDateString() === yesterday.toDateString()) label = 'Yesterday';
    else label = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    if (!groups[label]) groups[label] = [];
    groups[label].push(t);
  });
  return groups;
};

const getTodayTotal = (txns, currency) => {
  const today = '2026-05-03';
  return txns.filter(t => t.date === today).reduce((s, t) => s + t.amount, 0);
};

    onClose();

          <div style={{ fontSize:18, fontWeight:700, color:t.text, textAlign:'center' }}>{txn.title}</div>

            display:'inline-flex', alignItems:'center', gap:6, padding:'5px 14px',
            borderRadius:20, background:catColor + '18', border:`1px solid ${catColor}33`,

            <span style={{ fontSize:13, fontWeight:600, color:catColor }}>{txn.category}</span>
          </div>
        </div>

        {/* Details rows */}
        <div style={{ padding:'24px 24px 0', display:'flex', flexDirection:'column', gap:0 }}>

// ─── TRANSACTION ITEM ────────────────────────────────────────────────────────
const TxnItem = ({ txn, t, currency, onDelete, onTap, animIndex }) => {
  const [swiped, setSwiped] = React.useState(false);
  const [removing, setRemoving] = React.useState(false);
  const touchStartX = React.useRef(null);
  const isDragging = React.useRef(false);

  const handleDelete = (e) => {
    e.stopPropagation();
    setRemoving(true);
    setTimeout(() => onDelete(txn.id), 350);
  };

  const handleTouchStart = (e) => {
    touchStartX.current = e.touches[0].clientX;
    isDragging.current = false;
  };

  const handleTouchMove = (e) => {
    if (touchStartX.current === null) return;
    const dx = touchStartX.current - e.touches[0].clientX;
    if (dx > 30) { isDragging.current = true; setSwiped(true); }
    else if (dx < -10) { isDragging.current = false; setSwiped(false); }
  };

  const handleTouchEnd = () => { touchStartX.current = null; };

  const handleClick = () => {
    if (isDragging.current) { isDragging.current = false; return; }
    if (swiped) { setSwiped(false); return; }
    onTap(txn);
  };

  return (
    <div style={{
      position:'relative', overflow:'hidden', borderRadius:12, marginBottom:2,
      animation: `fadeInUp 0.4s ease ${animIndex * 0.06}s both`,
      height: removing ? 0 : 'auto',
      transition: removing ? 'height 0.35s ease, opacity 0.35s ease' : undefined,
      opacity: removing ? 0 : 1,
    }}>
      {/* Swipe delete bg */}
      <div style={{
        position:'absolute', right:0, top:0, bottom:0, width:80,
        background:t.danger, display:'flex', alignItems:'center', justifyContent:'center',
        borderRadius:'0 12px 12px 0',
      }}>
        <div onClick={handleDelete} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4, cursor:'pointer' }}>
          <Icon name="trash" size={18} color="#fff" />
          <span style={{ fontSize:10, color:'#fff', fontWeight:600 }}>Delete</span>
        </div>
      </div>

      {/* Item */}
      <div style={{
        display:'flex', alignItems:'center', gap:12, padding:'10px 12px',
        background:t.card, borderRadius:12, cursor:'pointer', userSelect:'none',
        transform: swiped ? 'translateX(-80px)' : 'translateX(0)',
        transition:'transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94)',
        position:'relative', zIndex:1,
      }}
        onClick={handleClick}
        onTouchStart={handleTouchStart}
        onTouchMove={handleTouchMove}
        onTouchEnd={handleTouchEnd}
      >
        <div style={{
          width:44, height:44, borderRadius:12, flexShrink:0,
          background: CAT_COLORS[txn.category] + '22',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:20,
        }}>{CAT_ICONS[txn.category]}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:14, fontWeight:600, color:t.text, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{txn.title}</div>
          <div style={{ fontSize:12, color:t.textSec, marginTop:2 }}>{txn.category}</div>
        </div>
        <div style={{ textAlign:'right', flexShrink:0 }}>
          <div style={{ fontSize:15, fontWeight:700, color:t.expense }}>-{fmt(txn.amount, currency)}</div>
          <div style={{ fontSize:11, color:t.textSec, marginTop:2 }}>
            {new Date(txn.date).toLocaleDateString('en-US', { month:'short', day:'numeric' })}
          </div>
        </div>
      </div>
    </div>
  );
};

  const handlePullEnd = (e) => {
    if (pullStartY.current === null) return;
    const endY = e.changedTouches?.[0]?.clientY ?? e.clientY;
    if (endY - pullStartY.current > 60) { setRefreshing(true); setTimeout(() => setRefreshing(false), 1200); }

  const groups = groupByDate(filteredTxns);

    setRefreshing(true);

// ─── DONUT CHART ──────────────────────────────────────────────────────────────
const DonutChart = ({ data, t, currency }) => {
  const total = data.reduce((s,d) => s + d.amount, 0);
  if (total === 0) return null;

  const R = 70, strokeW = 22;
  const circumference = 2 * Math.PI * R;
  let offset = 0;
  const segments = data.map(d => {
    const pct = d.amount / total;
    const dashLen = pct * circumference;
    const seg = { ...d, pct, dashLen, offset };
    offset += dashLen;
    return seg;
  });

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', position:'relative' }}>
      <svg width={200} height={200} viewBox="-10 -10 180 180" style={{ overflow:'visible' }}>
        <circle cx={80} cy={80} r={R} fill="none" stroke={t.border} strokeWidth={strokeW} />
        {segments.map((seg, i) => (
          <circle key={i} cx={80} cy={80} r={R}
            fill="none" stroke={seg.color} strokeWidth={strokeW}
            strokeDasharray={`${seg.dashLen} ${circumference - seg.dashLen}`}
            strokeDashoffset={circumference * 0.25 - seg.offset}
            strokeLinecap="butt"
            style={{ transition:`stroke-dashoffset 0.8s ease ${i * 0.08}s, stroke-dasharray 0.8s ease ${i * 0.08}s` }}
          />
        ))}
        <text x={80} y={72} textAnchor="middle" fontSize={11} fill={t.textSec} fontFamily="Inter, sans-serif" fontWeight={500}>Total</text>
        <text x={80} y={92} textAnchor="middle" fontSize={16} fill={t.text} fontFamily="Inter, sans-serif" fontWeight={800}>{fmt(total, currency)}</text>
      </svg>
    </div>
  );
};

      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'0 16px 80px', scrollbarWidth:'none' }}>
        {txns.length === 0 ? (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'60px 24px', gap:16 }}>
            <div style={{ fontSize:56, animation:'float 3s ease-in-out infinite' }}>📊</div>
            <div style={{ fontSize:16, fontWeight:600, color:t.text }}>No data for this month</div>
            <div style={{ fontSize:13, color:t.textSec }}>Add some expenses to see analytics</div>
          </div>
        ) : (
          <>
            {/* Overview card */}
            <div style={{ background:`linear-gradient(135deg, ${t.primary} 0%, ${t.primaryDark} 100%)`, borderRadius:20, padding:20, marginBottom:16, boxShadow:`0 8px 24px ${t.primary}44`, animation:'fadeInUp 0.3s ease both' }}>
              <div style={{ fontSize:13, color:'rgba(255,255,255,0.7)', fontWeight:500, marginBottom:6 }}>Total Spent</div>
              <div style={{ fontSize:32, fontWeight:800, color:'#fff', letterSpacing:'-1px', marginBottom:8 }}>{fmt(total, currency)}</div>
              {diff !== null && (
                <div style={{ display:'flex', alignItems:'center', gap:6, background:'rgba(255,255,255,0.15)', borderRadius:8, padding:'6px 10px', width:'fit-content' }}>
                  {diff > 0 ? <Icon name="trendUp" size={14} color="#fff" /> : <Icon name="trendDown" size={14} color="#fff" />}
                  <span style={{ fontSize:12, color:'#fff', fontWeight:600 }}>
                    {diff > 0 ? '+' : ''}{diff}% from last month
                  </span>
                </div>
              )}
            </div>

            {/* Donut */}
            <div style={{ background:t.card, borderRadius:20, padding:20, marginBottom:16, boxShadow:t.shadow, animation:'fadeInUp 0.3s ease 0.1s both' }}>
              <div style={{ fontSize:15, fontWeight:700, color:t.text, marginBottom:16 }}>Spending by Category</div>
              <DonutChart data={catData} t={t} currency={currency} />
            </div>

            {/* Category list */}
            <div style={{ background:t.card, borderRadius:20, padding:'16px', boxShadow:t.shadow, animation:'fadeInUp 0.3s ease 0.2s both' }}>
              <div style={{ fontSize:15, fontWeight:700, color:t.text, marginBottom:14 }}>Breakdown</div>
              {catData.map((c, i) => (
                <div key={c.cat} style={{ marginBottom: i < catData.length - 1 ? 16 : 0, animation:`fadeInUp 0.3s ease ${0.25 + i*0.05}s both` }}>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                      <div style={{ width:10, height:10, borderRadius:'50%', background:c.color, flexShrink:0 }} />
                      <span style={{ fontSize:14, fontWeight:500, color:t.text }}>{c.cat}</span>
                      <span style={{ fontSize:11, color:t.textSec }}>{CAT_ICONS[c.cat]}</span>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                      <span style={{ fontSize:13, fontWeight:600, color:t.text }}>{fmt(c.amount, currency)}</span>
                      <span style={{ fontSize:11, color:t.textSec, minWidth:32, textAlign:'right' }}>{c.pct}%</span>
                    </div>
                  </div>
                  {/* Bar */}
                  <div style={{ height:6, background:t.border, borderRadius:3, overflow:'hidden' }}>
                    <div style={{
                      height:'100%', borderRadius:3, background:c.color,
                      width:`${c.pct}%`, transition:`width 0.8s cubic-bezier(0.34,1.56,0.64,1) ${i*0.05}s`,
                    }} />
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
};

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
const BottomNav = ({ tab, setTab, t }) => (
  <div style={{
    display:'flex', borderTop:`1px solid ${t.border}`, background:t.navBg,
    height:64, position:'absolute', bottom:0, left:0, right:0, zIndex:20,
  }}>
    {[
      { id:'home', icon:'home', label:'Home' },
      { id:'analytics', icon:'analytics', label:'Analytics' },
    ].map(item => {
      const active = tab === item.id;
      return (
        <div key={item.id} onClick={() => setTab(item.id)} style={{
          flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:4,
          cursor:'pointer', transition:'opacity 0.15s ease',
        }}>
          <Icon name={item.icon} size={22} color={active ? t.primary : t.textSec} />
          <span style={{ fontSize:11, fontWeight: active ? 700 : 500, color: active ? t.primary : t.textSec }}>{item.label}</span>
        </div>
      );
    })}
  </div>
);

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const App = () => {
  const { useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakColor, TweakSelect } = window;

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const { darkMode, currency, accentColor } = tweaks;
  const t = theme(darkMode, accentColor);

  const [screen, setScreen] = React.useState('onboarding'); // onboarding | home | add | edit | settings
  const [tab, setTab] = React.useState('home');
  const [data, setData] = React.useState(INITIAL_DATA);
  const [curYear, setCurYear] = React.useState(2026);
  const [curMonth, setCurMonth] = React.useState(5);
  const [searchMode, setSearchMode] = React.useState(false);
  const [selectedTxn, setSelectedTxn] = React.useState(null); // for detail sheet
  const [editingTxn, setEditingTxn] = React.useState(null);   // for edit screen
  const [confirmClear, setConfirmClear] = React.useState(false);

  const handleClearData = () => {
    if (!confirmClear) { setConfirmClear(true); setTimeout(() => setConfirmClear(false), 3000); return; }
    setData({});
    setConfirmClear(false);
    window._toastMsg = 'All data cleared';
    setScreen('home');
    setTab('home');
  };

  const monthKey = `${curYear}-${curMonth}`;

  const handlePrevMonth = () => {
    if (curMonth === 1) { setCurYear(y => y-1); setCurMonth(12); }
    else setCurMonth(m => m-1);
  };
  const handleNextMonth = () => {
    if (curMonth === 12) { setCurYear(y => y+1); setCurMonth(1); }
    else setCurMonth(m => m+1);
  };

  const handleSaveExpense = (expense) => {
    const eMonth = parseInt(expense.date.split('-')[1]);
    const eYear = parseInt(expense.date.split('-')[0]);
    const key = `${eYear}-${eMonth}`;
    setData(prev => ({ ...prev, [key]: [expense, ...(prev[key] || [])] }));
    window._toastMsg = 'Expense added successfully ✓';
    setScreen('home');
    setTab('home');
  };

  const handleSaveEdit = (updated) => {
    const eMonth = parseInt(updated.date.split('-')[1]);
    const eYear = parseInt(updated.date.split('-')[0]);
    const key = `${eYear}-${eMonth}`;
    // Remove from all months, add to correct month
    setData(prev => {
      const next = {};
      Object.keys(prev).forEach(k => {
        next[k] = (prev[k] || []).filter(x => x.id !== updated.id);
      });
      next[key] = [updated, ...(next[key] || [])];
      return next;
    });
    window._toastMsg = 'Expense updated ✓';
    setScreen('home');
    setEditingTxn(null);
  };

  const handleDeleteTxn = (id) => {
    setData(prev => {
      const next = {};
      Object.keys(prev).forEach(k => { next[k] = (prev[k] || []).filter(x => x.id !== id); });
      return next;
    });
    setSelectedTxn(null);
  };

  const handleTapTxn = (txnOrAction) => {
    if (txnOrAction === 'settings') { setScreen('settings'); return; }
    setSelectedTxn(txnOrAction);
  };

  const renderScreen = () => {
    if (screen === 'onboarding') return <OnboardingScreen t={t} onDone={() => setScreen('home')} />;
    if (screen === 'add') return <AddExpenseScreen t={t} currency={currency} onBack={() => setScreen('home')} onSave={handleSaveExpense} monthKey={monthKey} />;
    if (screen === 'edit' && editingTxn) return <EditExpenseScreen txn={editingTxn} t={t} currency={currency} onBack={() => { setScreen('home'); setEditingTxn(null); }} onSave={handleSaveEdit} />;
    if (screen === 'settings') return <SettingsScreen t={t} onBack={() => setScreen('home')} darkMode={darkMode} onToggleDark={v => setTweak('darkMode', v)} currency={currency} onCurrencyChange={v => setTweak('currency', v)} onClearData={handleClearData} confirmClear={confirmClear} />;;
    if (tab === 'analytics') return <AnalyticsScreen t={t} currency={currency} data={data} monthKey={monthKey} month={curMonth} year={curYear} onPrevMonth={handlePrevMonth} onNextMonth={handleNextMonth} />;
    return (
      <HomeScreen
        t={t} currency={currency} data={data} setData={setData}
        monthKey={monthKey} month={curMonth} year={curYear}
        onPrevMonth={handlePrevMonth} onNextMonth={handleNextMonth}
        onAddExpense={() => setScreen('add')}
        searchMode={searchMode} setSearchMode={setSearchMode}
        onTapTxn={handleTapTxn}
        onGoAnalytics={() => setTab('analytics')}
      />
    );
  };

  const showNav = screen !== 'add' && screen !== 'edit' && screen !== 'onboarding' && screen !== 'settings';

  return (
    <>
      <AndroidDevice dark={darkMode} width={390} height={844}>
        <div style={{
          width:'100%', height:'100%', display:'flex', flexDirection:'column',
          background:t.bg, position:'relative', overflow:'hidden', fontFamily:'Inter, sans-serif',
        }}>
          {renderScreen()}
          {showNav && <BottomNav tab={tab} setTab={setTab} t={t} />}

          {/* Expense detail sheet overlay */}
          {selectedTxn && (
            <ExpenseDetailSheet
              txn={selectedTxn}
              t={t}
              currency={currency}
              onClose={() => setSelectedTxn(null)}
              onEdit={(txn) => { setEditingTxn(txn); setScreen('edit'); }}
              onDelete={handleDeleteTxn}
            />
          )}
        </div>
      </AndroidDevice>

      <TweaksPanel>
        <TweakSection title="Appearance">
          <TweakToggle id="darkMode" label="Dark Mode" value={darkMode} onChange={v => setTweak('darkMode', v)} />
          <TweakColor id="accentColor" label="Accent Color" value={accentColor} onChange={v => setTweak('accentColor', v)} />
        </TweakSection>
        <TweakSection title="Locale">
          <TweakSelect id="currency" label="Currency Symbol" value={currency}
            options={[
              { value:'৳', label:'৳ Taka' },
              { value:'$', label:'$ Dollar' },
              { value:'€', label:'€ Euro' },
              { value:'£', label:'£ Pound' },
              { value:'₹', label:'₹ Rupee' },
            ]}
            onChange={v => setTweak('currency', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
